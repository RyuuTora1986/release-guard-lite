name: Release Guard

on:
  pull_request:
    branches: [main, master]

jobs:
  release-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for diff

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx release-guard run
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
