name: Release Guard

on:
  pull_request:
    branches: [main, master]

jobs:
  release-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run Release Guard
        run: npx tsx src/cli.ts run --no-push --json > release-guard-result.json || true

      - name: Show result
        run: cat release-guard-result.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-guard-report
          path: .release-guard/latest-report.md
